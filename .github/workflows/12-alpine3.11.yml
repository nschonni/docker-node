name: 12 on alpine3.11

on:
  pull_request:
    paths:
      - 12/alpine3.11/Dockerfile

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v1
      - run: sudo apt-get install bats
      - run: ./test-build.sh $NODE_VERSION $VARIANT
    env:
      NODE_VERSION: "12"
      VARIANT: "alpine3.11"
