name: chakracore on 10

on:
  pull_request:
    paths:
      - chakracore/10/Dockerfile

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v1
      - run: sudo apt-get install bats
      - run: ./test-build.sh $NODE_VERSION $VARIANT
    env:
      NODE_VERSION: "chakracore"
      VARIANT: "10"
